server.port=8081
spring.application.name=product-service

spring.datasource.url=jdbc:h2:mem:productdb
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.boot.admin.client.url=http://localhost:9090
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
logging.level.com.shop=DEBUG

spring.data.redis.host=localhost
spring.data.redis.port=6379

# ── Resilience4j Circuit Breaker ──
resilience4j.circuitbreaker.instances.orderService.sliding-window-size=5
resilience4j.circuitbreaker.instances.orderService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.orderService.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.orderService.permitted-number-of-calls-in-half-open-state=2
resilience4j.circuitbreaker.instances.orderService.register-health-indicator=true

# ── Resilience4j Retry ──
resilience4j.retry.instances.orderService.max-attempts=3
resilience4j.retry.instances.orderService.wait-duration=500ms
resilience4j.retry.instances.orderService.enable-exponential-backoff=true
resilience4j.retry.instances.orderService.exponential-backoff-multiplier=2

# ── Resilience4j Bulkhead (Semaphore) ──
resilience4j.bulkhead.instances.orderService.max-concurrent-calls=10
resilience4j.bulkhead.instances.orderService.max-wait-duration=0ms
