name: build-and-deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout the code
      - name: Checkout repository
        uses: actions/checkout@v3

      # Configure AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # Log in to ECR
      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v1

      # Build and push backend Docker image
      - name: Build and push backend image
        run: |
          docker build -t perler-backend ./backend
          docker tag perler-backend:latest 922863082632.dkr.ecr.us-east-1.amazonaws.com/perler-backend:latest
          docker push 922863082632.dkr.ecr.us-east-1.amazonaws.com/perler-backend:latest

      # Build and push frontend Docker image
      - name: Build and push frontend image
        run: |
          docker build -t perler-frontend ./shop-app
          docker tag perler-frontend:latest 922863082632.dkr.ecr.us-east-1.amazonaws.com/perler-frontend:latest
          docker push 922863082632.dkr.ecr.us-east-1.amazonaws.com/perler-frontend:latest

      # Deploy to ECS
      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster perler-cluster-github \
            --service admin-server-service \
            --force-new-deployment
          aws ecs update-service \
            --cluster perler-cluster-github \
            --service api-gateway-service \
            --force-new-deployment
          aws ecs update-service \
            --cluster perler-cluster-github \
            --service inventory-service-service \
            --force-new-deployment
          aws ecs update-service \
            --cluster perler-cluster-github \
            --service order-service-service \
            --force-new-deployment
          aws ecs update-service \
            --cluster perler-cluster-github \
            --service product-service-service \
            --force-new-deployment
          aws ecs update-service \
            --cluster perler-cluster-github \
            --service frontend-service \
            --force-new-deployment