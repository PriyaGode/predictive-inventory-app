input {
  tcp {
    port => 5001
    codec => json_lines
  }
  udp {
    port => 5001
    codec => json_lines
  }
}

filter {
  if [logger_name] {
    mutate {
      add_field => { "service" => "%{[spring_application_name]}" }
    }
  }
  date {
    match => ["@timestamp", "ISO8601"]
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "shop-logs-%{[spring_application_name]}-%{+YYYY.MM.dd}"
  }
  stdout {
    codec => rubydebug
  }
}
